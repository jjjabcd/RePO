name: momu
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # setuptools<80: pkg_resources was removed in setuptools 80.0 (April 2025); hyperopt/chemprop need it
    - setuptools<80

    # Distributed training launcher (used by run_RL_training.sh via `accelerate launch`)
    - accelerate==1.1.1
    - datasets==3.1.0
    - deepspeed==0.15.4
    - nvidia-cuda-nvcc-cu12  # provides nvcc binary for DeepSpeed CUDA_HOME detection

    # HuggingFace ML stack (pinned to match mumo_requirements.txt)
    - transformers==4.51.3  # >=4.48.2 for vllm; <4.52 avoids keep_torch_compile arg not yet in accelerate 1.1.1
    - trl==0.15.0
    - peft==0.14.0
    - bitsandbytes==0.45.0
    - safetensors==0.4.5
    - sentencepiece==0.2.0
    - tokenizers>=0.20.3   # vllm==0.7.2 upgrades this to 0.22.2
    - huggingface-hub>=0.26.3  # vllm==0.7.2 upgrades this to 0.36.2
    - wandb==0.18.7
    - vllm==0.7.2         # pre-built wheel; used for fast generation (use_vllm: true in config)
    - math-verify==0.5.2  # pulls in latex2sympy2_extended; used by rewards.py
    - openai<2            # rewards.py passes api_key="" for local vLLM; openai>=2 rejects empty keys
    # Note: flash_attn is NOT installed (no pre-built wheel); config uses attn_implementation: sdpa

    # Property API servers (admetModel_api.py, drd2Model_api.py)
    - fastapi==0.128.8
    - uvicorn==0.40.0
    - pydantic

    # admet_ai and its required chain
    - admet_ai==1.3.1
    - chemprop==1.6.1
    - descriptastorus==2.8.0
    - hyperopt==0.2.7

    # Chemistry
    - rdkit==2024.3.6

    # PyTorch pinned to <2.6: chemprop 1.6.1 uses torch.load() without weights_only=False
    - torch==2.5.1

    # Scientific stack (pinned to match mumo_requirements.txt)
    - numpy==1.26.4
    - scipy==1.14.1
    - scikit-learn==1.5.2
    - pandas==2.1.4
    - networkx==3.4.2

    # Misc
    - requests==2.32.3
